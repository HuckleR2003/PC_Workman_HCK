name: Mirror to GitLab

on:
  push:
    branches: ["**"]
    tags: ["**"]

jobs:
  mirror:
    name: Sync GitHub → GitLab
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # pełna historia — bez tego shallow clone, mirror się wysypie

      - name: Push mirror to GitLab
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/kematex2202/PC_Workman_HCK.git"
          git push --mirror gitlab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
